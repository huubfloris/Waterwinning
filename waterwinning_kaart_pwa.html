<!doctype html>
<html lang="nl"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waterwinning kaart</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
html,body,#map{height:100%;margin:0}
.legend{background:#fff;padding:8px 10px;border-radius:4px;box-shadow:0 0 8px rgba(0,0,0,.2);line-height:1.4}
.legend .item{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.swatch{width:12px;height:12px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
map.setView([52.08722,6.45778],14);
const typeColors={1:'#e74c3c',2:'#2980b9'};
function typeNaam(code){return code==1?'Brandkraan':code==2?'Geboorde put':'-';}
fetch('waterwinning.geojson').then(r=>r.json()).then(data=>{
 const markers=L.markerClusterGroup();
 const gj=L.geoJSON(data,{
   pointToLayer:(f,latlng)=>{
     const p=f.properties; const c=Number(p.code_d);
     const col=typeColors[c]||'#888';
     const m=L.circleMarker(latlng,{radius:6,color:col,fillColor:col,fillOpacity:0.9,weight:1});
     m.bindPopup(`<b>${p.straat}</b><br>${p.postcode} ${p.plaats}<hr>`+
                 `Type: ${typeNaam(c)}<br>`+
                 `Diameter: ${p.category} mm<br>`+
                 `Volgnummer: ${p.code_c}`);
     return m;
   }
 }); markers.addLayer(gj); map.addLayer(markers);
});
const legend=L.control({position:'bottomleft'});
legend.onAdd=function(){const d=L.DomUtil.create('div','legend'); d.innerHTML='<b>Legenda</b><br>'+
 `<div class="item"><span class="swatch" style="background:${typeColors[1]}"></span> Brandkraan</div>`+
 `<div class="item"><span class="swatch" style="background:${typeColors[2]}"></span> Geboorde put</div>`; return d;};
legend.addTo(map);
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
</script>
</body></html>
