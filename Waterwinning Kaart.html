<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Waterwinning kaart</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

<style>
html,body,#map { height:100%; margin:0; }
.legend { background:#fff; padding:8px 10px; border-radius:4px; box-shadow:0 0 8px rgba(0,0,0,.2); line-height:1.4; }
.legend .item { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.swatch { width:12px; height:12px; border-radius:50%; display:inline-block; }
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// basiskaart
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// startlocatie Ruurlo
map.setView([52.08722, 6.45778], 14);

// type-kleuren
const typeColors = {
    1: "#e74c3c",   // brandkraan
    2: "#2980b9"    // geboorde put
};

// Mapping typecode naar tekst
function typeNaam(code) {
    if (code == 1) return "Brandkraan";
    if (code == 2) return "Geboorde put";
    return "-";
}

// GeoJSON inladen
fetch("waterwinning.geojson")
.then(r => r.json())
.then(data => {

    const markers = L.markerClusterGroup();

    const gj = L.geoJSON(data, {
        pointToLayer: (feature, latlng) => {

            const p = feature.properties;
            const typeCode = Number(p.code_d);
            const typeText = typeNaam(typeCode);
            const kleur = typeColors[typeCode] || "#888";

            const marker = L.circleMarker(latlng, {
                radius: 6,
                color: kleur,
                fillColor: kleur,
                fillOpacity: 0.9,
                weight: 1
            });

            // popup
            marker.bindPopup(
                `<b>${p.straat}</b><br>` +
                `${p.postcode} ${p.plaats}<br><hr>` +
                `Type: ${typeText}<br>` +
                `Diameter: ${p.category} mm<br>` +
                `Volgnummer: ${p.code_c}`
            );

            return marker;
        }
    });

    markers.addLayer(gj);
    map.addLayer(markers);
});

// legenda
const legend = L.control({ position: "bottomleft" });
legend.onAdd = function() {
    const div = L.DomUtil.create("div", "legend");

    div.innerHTML =
        `<b>Legenda</b><br>` +
        `<div class="item"><span class="swatch" style="background:${typeColors[1]}"></span> Brandkraan</div>` +
        `<div class="item"><span class="swatch" style="background:${typeColors[2]}"></span> Geboorde put</div>`;

    return div;
};
legend.addTo(map);

</script>
</body>
</html>
