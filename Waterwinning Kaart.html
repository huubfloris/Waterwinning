<!doctype html>
<html lang="nl"><head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Waterwinning kaart</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>html,body,#map{height:100%;margin:0}.legend{background:#fff;padding:8px 10px;border-radius:4px;box-shadow:0 0 8px rgba(0,0,0,.2)}</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
map.setView([52.08722,6.45778],14);
fetch('waterwinning.geojson').then(r=>r.json()).then(data=>{
 const markers=L.markerClusterGroup();
 const gj=L.geoJSON(data,{pointToLayer:(f,latlng)=>{
   const m=L.circleMarker(latlng,{radius:6,color:'#007bff',fillColor:'#007bff',fillOpacity:0.9});
   const p=f.properties;
   m.bindPopup(`<b>${p.straat||''}</b><br>${p.postcode||''} ${p.gemeente||''}<br>Type: ${p.type_naam||''}<br>Diameter: ${p.diameter||''}`);
   return m;}});
 markers.addLayer(gj);
 map.addLayer(markers);
});
</script>
</body></html>
